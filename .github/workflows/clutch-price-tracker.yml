name: Clutch price tracker

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/clutch-price-tracker.yml"
      - "car_price_tracker/track_clutch_price.py"
      - "index.html"
      - "docs/index.html"
      - "README.md"
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: clutch-price-tracker
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Clutch price
        id: track
        run: |
          python car_price_tracker/track_clutch_price.py \
            --vehicle-id 115601 \
            --province NS \
            --state-file car_price_tracker/history/vehicle_115601.json \
            --issue-body-file car_price_tracker/last_issue.md \
            --public-status-file docs/status.json

      - name: Mirror public status for root Pages
        run: cp docs/status.json status.json

      - name: Commit tracker outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add car_price_tracker/history/vehicle_115601.json car_price_tracker/last_issue.md docs/status.json status.json
          git diff --cached --quiet || git commit -m "Update Clutch vehicle 115601 price history"
          git push

      - name: Open notification issue
        if: steps.track.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VEHICLE_NAME: ${{ steps.track.outputs.vehicle_name }}
          PRICE: ${{ steps.track.outputs.price }}
          WEBSITE_STATE: ${{ steps.track.outputs.website_state }}
        run: |
          gh issue create \
            --title "Clutch change: ${VEHICLE_NAME} now CAD ${PRICE} (${WEBSITE_STATE})" \
            --body-file car_price_tracker/last_issue.md
